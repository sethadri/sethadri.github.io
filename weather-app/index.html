<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app">

        <div class="search-container">
            <h1 class="app-title">Weather</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="Enter a city..." 
                    autocomplete="off"
                >
                <button id="search-btn">Search</button>
            </div>
            <p class="error-message" id="error-message"></p>
            <div class="recent-searches" id="recent-searches"></div>
        </div>

        <div class="weather-card" id="weather-card">

            <div class="weather-header">
                <div>
                    <h2 class="city-name" id="city-name">London</h2>
                    <p class="country" id="country">GB</p>
                </div>
                <div class="weather-icon" id="weather-icon">⛅</div>
            </div>

            <div class="temperature-container">
                <span class="temperature" id="temperature">--</span>
                <span class="unit">°C</span>
            </div>

            <p class="description" id="description">Partly cloudy</p>

            <div class="weather-details">
                <div class="detail">
                    <span class="detail-label">Feels like</span>
                    <span class="detail-value" id="feels-like">--°C</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Wind</span>
                    <span class="detail-value" id="wind">-- km/h</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Pressure</span>
                    <span class="detail-value" id="pressure">-- hPa</span>
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
